<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - UrbanFarm</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="glass-panel" style="padding: 40px 32px;">
            <div class="login-icon">
                <i data-lucide="shield-check" style="width: 32px; height: 32px;"></i>
            </div>
            
            <div style="color: var(--primary-color); font-size: 12px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; gap: 6px;">
                <i data-lucide="lock" style="width: 14px; height: 14px;"></i> AKSES ADMIN
            </div>

            <h1 class="login-title">Panel Administrasi</h1>
            <p class="login-subtitle">UrbanFarm · Sistem Manajemen Konten</p>

            <div id="error-msg" class="error-msg"></div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">Email Admin</label>
                    <div class="form-input-wrapper">
                        <i data-lucide="mail"></i>
                        <input type="email" id="email" class="form-control" placeholder="admin@urban.com" required>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 28px;">
                    <label class="form-label">Password</label>
                    <div class="form-input-wrapper">
                        <i data-lucide="key"></i>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" id="login-btn" class="btn-primary">Masuk ke Panel Admin</button>
            </form>

            <div style="margin-top: 24px; font-size: 13px; color: var(--text-secondary);">
                <a href="#" style="color: inherit; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 4px;">
                    <i data-lucide="arrow-left" style="width: 14px; height: 14px;"></i> Kembali ke Aplikasi
                </a>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
